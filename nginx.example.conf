# app reads X-Forwarded-Prefix via werkzeug.middleware.proxy_fix.ProxyFix (grove/start.py)
# static files, /data file serving, and the socket.io
# websocket all live under the same prefix automatically
# add the TLS block and $scheme if needed.

server {
    listen 80;
    server_name example.com;

    location /thisapp/here/ {
        # strip prefix when forwarding; proxyfix re-applies it via the header
        proxy_pass         http://127.0.0.1:5000/;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Prefix /thisapp/here;

        # webSocket upgrade (socket.io)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # large uploads / long jobs
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        client_max_body_size 256m;
    }
}
