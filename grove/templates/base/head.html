<script>
    // apply the saved theme + accent before first paint to avoid a flash
    (function () {
        try {
            var t = localStorage.getItem("theme");
            if (t) document.documentElement.setAttribute("data-bs-theme", t);
            var a = localStorage.getItem("accent");
            if (a) document.documentElement.style.setProperty("--app-accent", a);
        } catch (e) {}
    })();
</script>
