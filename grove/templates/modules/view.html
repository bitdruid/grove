<link id="hljs-dark" rel="stylesheet" href="{{ url_for('static', filename='css/highlight-panda-syntax-dark.min.css') }}">
<link id="hljs-light" rel="stylesheet" href="{{ url_for('static', filename='css/highlight-panda-syntax-light.min.css') }}">

<div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
    <code class="text-break">{{ view_file }}</code>
    <span class="d-inline-flex align-items-center gap-2">
        {% if view_query %}
            <span class="badge text-bg-warning" id="markCount">marking “{{ view_query }}”</span>
        {% endif %}
        <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('routes.data', filename=view_file) }}" target="_blank">raw</a>
    </span>
</div>

{% if view_truncated %}
    <div class="alert alert-warning py-1 px-2 small">
        File is large — showing the first part only. Use <strong>raw</strong> for the full file.
    </div>
{% endif %}

<pre class="m-0"><code id="fileview" class="hljs">{{ view_content }}</code></pre>

<script src="{{ url_for('static', filename='js/highlight.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/mark.min.js') }}"></script>
<script>
    (function () {
        // swap hljs theme with the app theme: github (light) / github-dark-dimmed (dark)
        const darkSheet = document.getElementById("hljs-dark");
        const lightSheet = document.getElementById("hljs-light");
        const syncHljsTheme = () => {
            const dark = document.documentElement.getAttribute("data-bs-theme") !== "light";
            darkSheet.disabled = !dark;
            lightSheet.disabled = dark;
        };
        syncHljsTheme();
        new MutationObserver(syncHljsTheme).observe(document.documentElement, {
            attributes: true, attributeFilter: ["data-bs-theme"],
        });

        const el = document.getElementById("fileview");
        hljs.highlightElement(el);

        const q = {{ view_query | tojson }};
        if (q) {
            // The query is Whoosh syntax (wildcards, quotes, AND/OR/NOT); mark.js
            // only does literal text, so reduce it to bare terms to highlight.
            const terms = q
                .replace(/["()]/g, " ")          // drop phrase quotes / grouping
                .replace(/[*?]/g, "")            // drop wildcards (*d* -> d)
                .split(/\s+/)
                .filter(t => t && !["AND", "OR", "NOT"].includes(t.toUpperCase()));

            const marker = new Mark(el);
            marker.mark(terms, {
                acrossElements: true,   // term may span highlight.js token spans
                done: function (total) {
                    const badge = document.getElementById("markCount");
                    if (badge) badge.textContent = total + " match(es) for “" + q + "”";
                    const first = el.querySelector("mark");
                    if (first) first.scrollIntoView({ behavior: "smooth", block: "center" });
                },
            });
        }
    })();
</script>
